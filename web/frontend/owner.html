<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Owner Profile — Who Owns Nashville?</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='5' fill='%233A5566'/%3E%3Cpath d='M16 6 L26 14 L23 14 L23 25 L18 25 L18 18 L14 18 L14 25 L9 25 L9 14 L6 14 Z' fill='%23D4A54E'/%3E%3C/svg%3E"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet">
<style>
  /* ParcelViewer app-shell, DADU-Homebody palette */
  :root{--slate:#3A5566;--teal:#406A64;--terra:#B58676;--gold:#D4A54E;--cream:#F0EBE1;--sand:#E1D4BB;--ink:#3A5566}
  html,body{height:100dvh;width:100vw;margin:0;padding:0;font-family:'Inter',-apple-system,'Segoe UI',sans-serif;overflow:hidden;color:#4a4a46}
  #header{height:64px;width:100%;display:flex;align-items:center;justify-content:space-between;background:var(--slate);color:#fff;box-sizing:border-box;padding:0 22px;border-bottom:3px solid var(--gold)}
  #header .brand{font-family:'Source Serif 4',Georgia,serif;font-size:21px;font-weight:700}
  #header .brand small{display:block;font-family:'Inter',sans-serif;font-size:10.5px;font-weight:400;opacity:.8;letter-spacing:1px;text-transform:uppercase}
  #header .sub{font-size:13px;opacity:.9}
  #mainWindow{display:flex;flex-direction:row;height:calc(100% - 64px)}
  #leftPane{flex:0 0 35%;max-width:490px;overflow:auto;background:var(--cream);border-right:1px solid #d8cfbe;box-sizing:border-box}
  #viewDiv{flex:1;position:relative}
  #map{position:absolute;inset:0}
  .pname{padding:16px 18px 8px;background:#fff;border-bottom:1px solid #e6ddcd}
  .pname h1{margin:0;font-family:'Source Serif 4',Georgia,serif;font-size:23px;font-weight:700;color:var(--slate)}
  .pname .brandlbl{font-size:12px;color:var(--teal);font-weight:600;margin-top:3px}
  .statrow{display:flex;flex-wrap:wrap;background:#fff;border-bottom:1px solid #e6ddcd}
  .stat{flex:1 0 33%;padding:10px 14px;border-top:1px solid #f3ede2;box-sizing:border-box}
  .stat b{display:block;font-size:20px;color:var(--slate);font-weight:700}
  .stat b.accent{color:var(--gold)}
  .stat span{font-size:10px;color:#918A83;text-transform:uppercase;letter-spacing:.5px}
  .sec{background:#fff;margin:8px 0 0;padding:12px 16px;border-bottom:1px solid #e6ddcd}
  .sec h2{margin:0 0 8px;font-size:11.5px;color:var(--teal);text-transform:uppercase;letter-spacing:1px;font-weight:700}
  .sec h3{margin:10px 0 2px;font-size:12px;color:var(--slate);font-weight:600}
  .sec p{margin:2px 0;font-size:13px;line-height:1.5}
  .big{font-size:17px;color:var(--terra);font-weight:700}
  .kv{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;border-bottom:1px solid #f3ede2}
  .kv b{color:var(--slate)}
  .chip{display:inline-block;background:var(--cream);border:1px solid var(--sand);border-radius:3px;padding:2px 8px;margin:2px;font-size:11.5px;color:#6b5a45}
  .lnk{display:inline-block;margin:6px 8px 2px 0;padding:6px 12px;background:var(--teal);color:#fff;border-radius:3px;text-decoration:none;font-size:12px;font-weight:600}
  .lnk:hover{background:#345650}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th,td{text-align:left;padding:4px 6px;border-bottom:1px solid #f0ebe1}
  th{color:var(--slate);border-bottom:2px solid var(--sand)}
  .muted{color:#918A83;font-size:12px}
  a{color:var(--teal)}
</style>
</head>
<body>
<div id="header">
  <div class="brand">Who Owns Nashville?<small>Corporate Ownership Explorer</small></div>
  <div class="sub" id="hdrSub"></div>
</div>
<div id="mainWindow">
  <div id="leftPane"><div id="panel">Loading…</div></div>
  <div id="viewDiv"><div id="map"></div></div>
</div>
<script>
const id=new URLSearchParams(location.search).get('id')||'1';
const D=v=>v==null?'—':'$'+Number(v).toLocaleString();
const P=v=>v==null?'—':v+'%';
fetch(`data/owners/${id}.json`).then(r=>r.json()).then(d=>{
  const pf=d.portfolio||{}, po=d.principal_offices||[], ra=d.registered_agents||[];
  document.getElementById('hdrSub').textContent=d.parcel_count.toLocaleString()+' parcels · Davidson County, TN';
  document.getElementById('panel').innerHTML=`
   <div class="pname"><h1>${d.name}</h1><div class="brandlbl">${d.brand||''}</div></div>
   <div class="statrow">
     <div class="stat"><b>${d.parcel_count.toLocaleString()}</b><span>Parcels</span></div>
     <div class="stat"><b class="accent">${d.total_market_value?('$'+(d.total_market_value/1e6).toFixed(1)+'M'):'—'}</b><span>Market value</span></div>
     <div class="stat"><b>${d.total_acres?d.total_acres.toLocaleString():'—'}</b><span>Acres</span></div>
     <div class="stat"><b>${d.entity_count}</b><span>Entities</span></div>
     <div class="stat"><b>${po.length}</b><span>Principal offices</span></div>
     <div class="stat"><b>${ra.length}</b><span>Reg. agents</span></div>
   </div>

   <div class="sec"><h2>Tennessee Secretary of State</h2>
     <div class="kv"><span>Status</span><b>${d.primary_sos_status||'—'}</b></div>
     <div class="kv"><span>Formed in</span><b>${d.primary_foreign_state||'—'}</b></div>
     <h3>Principal office(s)</h3>
     ${po.map(p=>'<div class="chip">'+p+'</div>').join('')||'<span class="muted">SOS pull in progress</span>'}
     <h3>Registered agent(s)</h3>
     ${ra.map(p=>'<div class="chip">'+p+'</div>').join('')||'<span class="muted">—</span>'}
     <div style="margin-top:8px;">
       <a class="lnk" href="${d.opencorporates}" target="_blank" rel="noopener">OpenCorporates ↗</a>
       <a class="lnk" href="https://tncab.tnsos.gov/portal/business-entity-search" target="_blank" rel="noopener">TN SOS ↗</a>
     </div>
   </div>

   <div class="sec"><h2>Nashville Portfolio Analysis</h2>
     <h3>Neighborhood income</h3>
     <p>Across their ${pf.n_parcels_with_acs||d.parcel_count} parcels, avg neighborhood median income is <span class="big">${D(pf.median_income)}</span>.</p>
     <h3>Tenure &amp; concentration</h3>
     <p><b>${P(pf.pct_renter)}</b> of households in their neighborhoods are renters.</p>
     <h3>Racial composition</h3>
     <p><b>${P(pf.pct_black)} Black</b>, ${P(pf.pct_white)} White, ${P(pf.pct_hispanic)} Hispanic, ${P(pf.pct_asian)} Asian.</p>
     <h3>Home values &amp; vulnerability</h3>
     <p>Median home value <span class="big">${D(pf.median_home_value)}</span> · ${P(pf.pct_poverty)} below poverty · ${P(pf.pct_vacant)} vacant.</p>
   </div>

   <div class="sec"><h2>Related owners (${(d.related||[]).length})</h2>
     <table><thead><tr><th>Owner</th><th>Via</th><th style="text-align:right;">Parcels</th></tr></thead>
     <tbody>${(d.related||[]).map(r=>`<tr><td>${r.owner}</td><td class="muted">${r.via}</td><td style="text-align:right;">${r.parcels}</td></tr>`).join('')}</tbody></table>
   </div>

   <div class="sec"><h2>Owner names on record (${d.owner_names.length})</h2>
     ${d.owner_names.map(n=>'<div class="chip">'+n+'</div>').join('')}
   </div>

   <div class="sec"><h2>Parcels held (${d.parcel_count.toLocaleString()})</h2>
     <table><thead><tr><th>Address</th><th style="text-align:right;">Bd/Ba</th><th style="text-align:right;">Sq ft</th><th style="text-align:right;">Value</th></tr></thead>
     <tbody>${d.parcels.map(p=>`<tr><td>${p.address||p.parcel_id}</td><td style="text-align:right;">${p.beds!=null?(p.beds+'/'+(p.bath||'—')):'—'}</td><td style="text-align:right;">${p.sqft?Number(p.sqft).toLocaleString():'—'}</td><td style="text-align:right;">${p.market_value?('$'+Number(p.market_value).toLocaleString()):'—'}</td></tr>`).join('')}</tbody></table>
   </div>`;

  const m=L.map('map').setView([36.166,-86.784],10);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap, © CARTO'}).addTo(m);
  const pts=d.parcels.filter(p=>p.lat&&p.lon).map(p=>L.circleMarker([+p.lat,+p.lon],{radius:5,fillColor:'#406A64',color:'#fff',weight:.6,fillOpacity:.85}).bindPopup((p.address||p.parcel_id)+(p.market_value?('<br>$'+Number(p.market_value).toLocaleString()):'')));
  if(pts.length){const g=L.featureGroup(pts).addTo(m);try{m.fitBounds(g.getBounds().pad(0.06));}catch(e){}}
}).catch(e=>{document.getElementById('panel').textContent='Owner '+id+' not found';});
</script>
</body>
</html>
