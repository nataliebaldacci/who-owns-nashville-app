<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Owner Profile — Who Owns Nashville?</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{--navy:#1c458c;--gold:#f0af1e}
  body{margin:0;font-family:Garamond,'EB Garamond',Georgia,serif;color:#222;background:#f7f5f1}
  header{background:var(--navy);color:#fff;padding:18px 26px;border-bottom:4px solid var(--gold)}
  header .kick{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700}
  header h1{margin:3px 0 0;font-size:26px}
  .wrap{max-width:1120px;margin:0 auto;padding:18px 22px}
  .stats{display:flex;gap:30px;flex-wrap:wrap;background:#fff;border:1px solid #e3ddd3;border-radius:8px;padding:14px 22px;margin-bottom:16px}
  .stat b{display:block;font-size:28px;color:var(--navy);font-weight:800}
  .stat span{font-size:11px;color:#777;text-transform:uppercase;letter-spacing:1px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .card{background:#fff;border:1px solid #e3ddd3;border-radius:8px;padding:14px 18px;margin-bottom:16px}
  .card h2{margin:0 0 4px;font-size:13px;color:var(--navy);text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid #eee;padding-bottom:5px}
  .card h3{margin:12px 0 2px;font-size:13px;color:#333}
  .card p{margin:2px 0;font-size:13.5px;line-height:1.5}
  .big{font-size:20px;color:var(--navy);font-weight:700}
  .chip{display:inline-block;background:#eef4fb;border:1px solid #d5e2f2;border-radius:12px;padding:2px 10px;margin:2px;font-size:12px}
  .lnk{display:inline-block;margin:6px 10px 2px 0;padding:6px 12px;background:var(--navy);color:#fff;border-radius:5px;text-decoration:none;font-size:12px;font-weight:600}
  a{color:var(--navy)}
  #map{height:440px;border-radius:8px;border:1px solid #e3ddd3;margin-bottom:16px}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th,td{text-align:left;padding:4px 8px;border-bottom:1px solid #eee}
  th{color:var(--navy)}
  .muted{color:#888;font-size:12px}
  .kv{display:flex;justify-content:space-between;font-size:13px;padding:2px 0;border-bottom:1px solid #f2efe9}
  .kv b{color:var(--navy)}
</style>
</head>
<body>
<header><div class="kick">Who Owns Nashville? &middot; Owner Profile</div><h1 id="ownerName">Loading…</h1></header>
<div class="wrap" id="wrap"></div>
<script>
const id=new URLSearchParams(location.search).get('id')||'1';
const D=v=>v==null?'—':'$'+Number(v).toLocaleString();
const P=v=>v==null?'—':v+'%';
fetch(`data/owners/${id}.json`).then(r=>r.json()).then(d=>{
  document.getElementById('ownerName').textContent=d.name;
  const pf=d.portfolio||{}, po=d.principal_offices||[], ra=d.registered_agents||[];
  const status=(d.primary_sos_status||'—'), foreign=(d.primary_foreign_state||'—');
  document.getElementById('wrap').innerHTML=`
   <div class="stats">
     <div class="stat"><b>${d.parcel_count.toLocaleString()}</b><span>Parcels</span></div>
     <div class="stat"><b>${d.total_market_value?('$'+(d.total_market_value/1e6).toFixed(1)+'M'):'—'}</b><span>Total market value</span></div>
     <div class="stat"><b>${d.total_acres?d.total_acres.toLocaleString():'—'}</b><span>Acres</span></div>
     <div class="stat"><b>${d.entity_count}</b><span>Corporate entities</span></div>
     <div class="stat"><b>${po.length}</b><span>Principal offices</span></div>
     <div class="stat"><b>${d.brand||'—'}</b><span>Operator brand</span></div>
   </div>

   <div class="grid">
     <div class="card"><h2>Tennessee Secretary of State</h2>
       <div class="kv"><span>Status</span><b>${status}</b></div>
       <div class="kv"><span>Formed in</span><b>${foreign}</b></div>
       <div class="kv"><span>Registered agents</span><b>${ra.length}</b></div>
       <h3>Principal office(s)</h3>
       ${po.map(p=>'<div class="chip">'+p+'</div>').join('')||'<span class="muted">not yet resolved (SOS pull in progress)</span>'}
       <h3>Registered agent(s)</h3>
       ${ra.map(p=>'<div class="chip">'+p+'</div>').join('')||'<span class="muted">—</span>'}
       <div style="margin-top:8px;">
         <a class="lnk" href="${d.opencorporates}" target="_blank" rel="noopener">OpenCorporates ↗</a>
         <a class="lnk" href="https://tncab.tnsos.gov/portal/business-entity-search" target="_blank" rel="noopener">TN SOS search ↗</a>
       </div>
     </div>

     <div class="card"><h2>Nashville Portfolio Analysis</h2>
       <h3>Neighborhood income</h3>
       <p>Across their ${pf.n_parcels_with_acs||d.parcel_count} parcels, the average neighborhood median income is <span class="big">${D(pf.median_income)}</span>.</p>
       <h3>Tenure &amp; concentration</h3>
       <p>On average, their portfolio sits in neighborhoods where <b>${P(pf.pct_renter)}</b> of households are renters.</p>
       <h3>Racial composition</h3>
       <p>Their neighborhoods average <b>${P(pf.pct_black)} Black</b>, ${P(pf.pct_white)} White, ${P(pf.pct_hispanic)} Hispanic, ${P(pf.pct_asian)} Asian.</p>
       <h3>Home values &amp; vulnerability</h3>
       <p>Avg neighborhood median home value is <span class="big">${D(pf.median_home_value)}</span>.<br>
          ${P(pf.pct_poverty)} households below poverty &middot; ${P(pf.pct_vacant)} housing units vacant.</p>
     </div>
   </div>

   <div id="map"></div>

   <div class="grid">
     <div class="card"><h2>Related owners (${(d.related||[]).length})</h2>
       <p class="muted">Shell entities merged into this owner via shared registered agent or mailing address.</p>
       <table><thead><tr><th>Owner</th><th>Via</th><th style="text-align:right;">Parcels</th></tr></thead>
       <tbody>${(d.related||[]).map(r=>`<tr><td>${r.owner}</td><td class="muted">${r.via}</td><td style="text-align:right;">${r.parcels}</td></tr>`).join('')}</tbody></table>
     </div>
     <div class="card"><h2>Owner names on record (${d.owner_names.length})</h2>
       <div style="max-height:340px;overflow:auto;">${d.owner_names.map(n=>'<div class="chip">'+n+'</div>').join('')}</div>
     </div>
   </div>

   <div class="card"><h2>Parcels held (${d.parcel_count.toLocaleString()})</h2>
     <div style="max-height:420px;overflow:auto;"><table><thead><tr>
       <th>Property address</th><th style="text-align:right;">Bd/Ba</th><th style="text-align:right;">Sq ft</th>
       <th style="text-align:right;">Built</th><th style="text-align:right;">Last sale</th><th style="text-align:right;">Market value</th></tr></thead>
     <tbody>${d.parcels.map(p=>`<tr>
       <td>${p.address||p.parcel_id}</td>
       <td style="text-align:right;">${p.beds!=null?(p.beds+'/'+(p.bath||'—')):'—'}</td>
       <td style="text-align:right;">${p.sqft?Number(p.sqft).toLocaleString():'—'}</td>
       <td style="text-align:right;">${p.year_built||'—'}</td>
       <td style="text-align:right;">${p.sale_price?('$'+Number(p.sale_price).toLocaleString()+(p.sale_date?(' · '+p.sale_date):'')):'—'}</td>
       <td style="text-align:right;">${p.market_value?('$'+Number(p.market_value).toLocaleString()):'—'}</td></tr>`).join('')}</tbody></table></div>
   </div>`;

  const m=L.map('map').setView([36.166,-86.784],10);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap, © CARTO'}).addTo(m);
  const pts=d.parcels.filter(p=>p.lat&&p.lon).map(p=>L.circleMarker([+p.lat,+p.lon],{radius:4,fillColor:'#cf307a',color:'#333',weight:.4,fillOpacity:.8}).bindPopup(p.address||p.parcel_id));
  if(pts.length){const g=L.featureGroup(pts).addTo(m);try{m.fitBounds(g.getBounds().pad(0.08));}catch(e){}}
}).catch(e=>{document.getElementById('ownerName').textContent='Owner '+id+' not found';});
</script>
</body>
</html>
