<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Who Owns Atlanta? — Under Maintenance</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 520px;
      text-align: center;
    }

    .icon {
      font-size: 3rem;
      margin-bottom: 1.5rem;
      opacity: 0.85;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #ffffff;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 1rem;
      color: #9ca3af;
      margin-bottom: 2rem;
    }

    .message {
      background: #1a1e2a;
      border: 1px solid #2d3245;
      border-radius: 10px;
      padding: 1.5rem 2rem;
      font-size: 0.95rem;
      line-height: 1.6;
      color: #c9cdd8;
    }

    .message strong {
      color: #f59e0b;
    }

    footer {
      margin-top: 2.5rem;
      font-size: 0.8rem;
      color: #4b5563;
    }

    footer a {
      color: #6b7280;
      text-decoration: none;
    }

    footer a:hover {
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🗺️</div>
    <h1>Who Owns Atlanta?</h1>
    <p class="subtitle">Atlanta property ownership, visualized.</p>

    <div class="message">
      We're currently down for maintenance.<br>
      <strong>We'll be back shortly.</strong>
    </div>

    <footer>
      <a href="mailto:hello@who-owns-atlanta.org">hello@who-owns-atlanta.org</a>
    </footer>
  </div>
</body>
</html>
