<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Who Owns Atlanta?</title>
  <meta name="description" content="Search Atlanta-area property ownership. Find who owns any address, track corporate landlords, and follow ownership networks across Fulton and DeKalb counties.">
  <meta property="og:title" content="Who Owns Atlanta?">
  <meta property="og:description" content="Search Atlanta-area property ownership. Track corporate landlords and ownership networks across 615,000 parcels.">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
  <meta property="og:image" content="/icons/icon-512.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css">
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <header>
    <a href="/" class="site-name">
      <span class="name-long">Who Owns Atlanta?</span>
      <span class="name-short">WOA</span>
    </a>
    <div class="search-wrapper">
      <input type="search" id="search-input" placeholder="Search an address…" autocomplete="off" aria-label="Search an address" aria-autocomplete="list" aria-controls="search-results">
      <ul id="search-results" role="listbox" hidden></ul>
    </div>

    <details class="filter-wrapper" id="filter-details">
      <summary id="filter-toggle" aria-label="Filter map" title="Filter map">
        <span class="filter-icon"><svg width="14" height="13" viewBox="0 0 14 13" fill="currentColor" aria-hidden="true"><path d="M0 0h14l-5 6v6l-4-2V6z"/></svg></span>
        <!-- Home Type pill (independent) -->
        <div id="filter-active-hometype" class="filter-pill" hidden>
          <span id="filter-hometype-label"></span>
          <button id="filter-clear-hometype" class="filter-pill-clear"
                  aria-label="Clear home type filter" type="button">✕</button>
        </div>
        <!-- Area filter pill -->
        <div id="filter-active" class="filter-pill" hidden>
          <span id="filter-active-label"></span>
          <button id="filter-clear" class="filter-pill-clear"
                  aria-label="Clear area filter" type="button">✕</button>
        </div>
      </summary>
      <div id="filter-panel">
        <!-- Home Type FIRST -->
        <div class="filter-row">
          <label for="filter-home-type">Home Type</label>
          <select id="filter-home-type" aria-label="Select Home Type">
            <option value="">All Types</option>
            <option value="Single-Family">Single-Family</option>
            <option value="Multi-Family / Condo">Multi-Family / Condo</option>
            <option value="Multi-Family / Other">Multi-Family / Other</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <hr class="filter-divider" role="separator" aria-hidden="true">
        <!-- Area filters: Council → NPU → Neighborhood (most specific last) -->
        <div class="filter-row">
          <label for="filter-council">Council</label>
          <select id="filter-council" aria-label="Select Council District"><option value="">All Districts</option></select>
        </div>
        <div class="filter-row">
          <label for="filter-npu">NPU</label>
          <select id="filter-npu" aria-label="Select NPU"><option value="">All NPUs</option></select>
        </div>
        <div class="filter-row-neighborhood">
          <label for="filter-neighborhood">Neighborhood</label>
          <div class="filter-search-wrapper">
            <input type="search" id="filter-neighborhood" placeholder="Search…" autocomplete="off" aria-autocomplete="list" aria-controls="filter-neighborhood-results" aria-expanded="false">
            <ul id="filter-neighborhood-results" hidden role="listbox"></ul>
          </div>
        </div>
      </div>
    </details>
  </header>

  <main id="main-content">
    <div id="map" role="region" aria-label="Interactive property ownership map"></div>
    <div id="cluster-loading" hidden role="status" aria-live="polite">Loading cluster…</div>
    <div id="map-legend" hidden aria-label="Map legend"></div>

    <aside id="detail-panel" hidden aria-live="polite" tabindex="-1">
      <button id="panel-close" aria-label="Close panel">✕</button>

      <div id="parcel-view">
        <h2 id="parcel-address"></h2>
        <div id="parcel-badges"></div>
        <p id="parcel-owner-line"></p>
        <dl id="parcel-meta"></dl>
        <div id="owner-mail-addr" hidden></div>
        <dl id="parcel-meta-city"></dl>

        <div id="parcel-units" hidden>
          <div class="units-header" id="parcel-units-summary"></div>
          <div class="units-scroll">
            <table class="units-table">
              <tbody id="parcel-units-list"></tbody>
            </table>
          </div>
        </div>

        <details id="parcel-permits">
          <summary>Building complaints</summary>
          <dl id="permit-meta"></dl>
        </details>

        <div id="parcel-links"></div>

        <a id="owner-profile-link" href="#" hidden>View full owner profile →</a>
        <a class="sources-footnote" href="/faq/#data-sources">ⓘ Data sources</a>
      </div>
    </aside>
  </main>

  <footer>
    <nav aria-label="Footer">
      <a href="/l/">Leaderboards</a>
      <a href="/numbers/"><span class="nav-short">Numbers</span><span class="nav-long">By The Numbers</span></a>
      <a href="/about/">About</a>
      <a href="/methodology/">Methodology</a>
      <a href="/faq/">FAQ</a>
    </nav>
  </footer>

  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
