# Production vhost — SSL via Let's Encrypt, rate limiting on /api/
#
# IMPORTANT: the following must be declared in the http {} block of nginx.conf,
# not here. Add these lines to /etc/nginx/nginx.conf inside the http block:
#   limit_req_zone $binary_remote_addr zone=woa_api:10m rate=10r/s;
#   proxy_cache_path /var/cache/nginx/woa levels=1:2 keys_zone=woa_cache:10m
#                    max_size=100m inactive=1d use_temp_path=off;

server {
    listen 80;
    server_name who-owns-atlanta.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name who-owns-atlanta.org;

    ssl_certificate     /etc/letsencrypt/live/who-owns-atlanta.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/who-owns-atlanta.org/privkey.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    root /var/www/who-owns-atlanta/frontend;
    index index.html;

    # Maintenance mode — uncomment the two lines below to activate:
    # error_page 503 /maintenance.html;
    # return 503;

    location = /maintenance.html { internal; }

    # Tiles are served from CloudFront — nginx never handles /tiles/ in prod.
    # Keeping this block commented as a fallback reference only.
    # location /tiles/ { ... }

    # Pre-generated static pages — served from /var/www/who-owns-atlanta/
    # Note: root is overridden per-block since the map page root is .../frontend
    location /l/ {
        root /var/www/who-owns-atlanta;
        try_files $uri $uri/index.html =404;
    }

    location /owner/ {
        root /var/www/who-owns-atlanta;
        try_files $uri $uri/index.html =404;
    }

    location /agent/ {
        root /var/www/who-owns-atlanta;
        try_files $uri $uri/index.html =404;
    }

    location /agents/ {
        root /var/www/who-owns-atlanta;
        try_files $uri $uri/index.html =404;
    }

    location /addresses/ {
        root /var/www/who-owns-atlanta;
        try_files $uri $uri/index.html =404;
    }

    location /leaderboard/ {
        root /var/www/who-owns-atlanta;
        try_files $uri $uri/index.html =404;
    }

    location /numbers/ {
        root /var/www/who-owns-atlanta;
        try_files $uri $uri/index.html =404;
    }

    location /api/ {
        limit_req zone=woa_api burst=30 nodelay;

        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache woa_cache;
        proxy_cache_valid 200 1d;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_lock on;
        proxy_ignore_headers Set-Cookie;
        # Include Origin in cache key so CORS responses are cached per-origin
        proxy_cache_key "$scheme$request_method$host$request_uri$http_origin";
        add_header X-Cache-Status $upstream_cache_status always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
