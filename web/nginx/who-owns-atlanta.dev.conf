# Dev vhost — plain HTTP, no SSL, no rate limiting, no proxy_cache
# Symlink to /etc/nginx/sites-enabled/ and add who-owns-atlanta.local to /etc/hosts
#
# /etc/hosts entry:
#   127.0.0.1  who-owns-atlanta.local who-owns-atlanta.lan

server {
    listen 80;
    server_name who-owns-atlanta.local who-owns-atlanta.lan;

    # Leaderboard hierarchy
    location /l/ {
        root /var/www/who-owns-atlanta;
        try_files $uri $uri/index.html =404;
    }

    # Pre-generated owner profile pages (Phase 4b — until then, falls through to 404)
    location /owner/ {
        root /var/www/who-owns-atlanta;
        try_files $uri $uri/index.html =404;
    }

    # Pre-generated registered agent pages and index
    location /agent/ {
        root /var/www/who-owns-atlanta;
        try_files $uri $uri/index.html =404;
    }

    location /agents/ {
        root /var/www/who-owns-atlanta;
        try_files $uri $uri/index.html =404;
    }

    # Pre-generated shared address pages (backward-compat alias; canonical is /l/addresses/)
    location /addresses/ {
        root /var/www/who-owns-atlanta;
        try_files $uri $uri/index.html =404;
    }

    # Pre-generated leaderboard page (Phase 4b)
    location /leaderboard/ {
        root /var/www/who-owns-atlanta;
        try_files $uri $uri/index.html =404;
    }

    # By the Numbers findings page
    location /numbers/ {
        root /var/www/who-owns-atlanta;
        try_files $uri $uri/index.html =404;
    }

    # Vector tiles — built by scripts/build_tiles.sh
    location /tiles/ {
        root /var/www/who-owns-atlanta;
        types { }
        default_type application/x-protobuf;
        add_header Access-Control-Allow-Origin "*";
        max_ranges 0;       # Disable range requests — partial PBF kills MapLibre
        gzip on;
        gzip_types application/x-protobuf application/octet-stream;
        gzip_min_length 256;
    }

    # API — proxy to FastAPI container
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static frontend (map page, CSS, JS, about, methodology, faq)
    location / {
        root /var/www/who-owns-atlanta/frontend;
        try_files $uri $uri/ =404;
    }
}
