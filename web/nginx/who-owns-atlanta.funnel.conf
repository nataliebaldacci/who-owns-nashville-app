# Funnel / beta vhost — accepts requests from Tailscale Funnel (oscar.taile1a74.ts.net)
# Basic auth enabled; otherwise identical to dev config.
# Symlink to /etc/nginx/sites-enabled/ before running: tailscale funnel 80

server {
    listen 80;
    server_name oscar.taile1a74.ts.net;

    auth_basic "Who Owns Atlanta — Beta";
    auth_basic_user_file /etc/nginx/auth/who-owns-atlanta;

    # Leaderboard hierarchy
    location /l/ {
        root /var/www/who-owns-atlanta;
        try_files $uri $uri/index.html =404;
    }

    # Pre-generated owner profile pages
    location /owner/ {
        root /var/www/who-owns-atlanta;
        try_files $uri $uri/index.html =404;
    }

    # Pre-generated registered agent pages and index
    location /agent/ {
        root /var/www/who-owns-atlanta;
        try_files $uri $uri/index.html =404;
    }

    location /agents/ {
        root /var/www/who-owns-atlanta;
        try_files $uri $uri/index.html =404;
    }

    # Pre-generated shared address pages
    location /addresses/ {
        root /var/www/who-owns-atlanta;
        try_files $uri $uri/index.html =404;
    }

    # Pre-generated leaderboard page
    location /leaderboard/ {
        root /var/www/who-owns-atlanta;
        try_files $uri $uri/index.html =404;
    }

    # By the Numbers findings page
    location /numbers/ {
        root /var/www/who-owns-atlanta;
        try_files $uri $uri/index.html =404;
    }

    # Vector tiles — built by scripts/build_tiles.sh
    location /tiles/ {
        root /var/www/who-owns-atlanta;
        types { }
        default_type application/x-protobuf;
        add_header Access-Control-Allow-Origin "*";
        max_ranges 0;       # Disable range requests — partial PBF kills MapLibre
        gzip on;
        gzip_types application/x-protobuf application/octet-stream;
        gzip_min_length 256;
    }

    # API — proxy to FastAPI container
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static frontend
    location / {
        root /var/www/who-owns-atlanta/frontend;
        try_files $uri $uri/ =404;
    }
}
